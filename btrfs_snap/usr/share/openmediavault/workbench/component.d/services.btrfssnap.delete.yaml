version: "1.0"
type: component
data:
  name: omv-services-btrfssnap-delete-form-page
  type: formPage
  config:
    request:
      service: BtrfsSnap
      post:
        method: deleteSnapshot
        progressMessage: _("Deleting snapshot...")
    fields:
      - type: paragraph
        title: _("Deleting - {{ _routeQueryParams.snapshot_name }}")
        text: _("Delete the selected snapshot permanently. This operation cannot be undone.")
      - type: textInput
        name: snapshot_name
        label: _("Snapshot")
        value: "{{ _routeQueryParams.snapshot_name }}"
        readonly: true
        submitValue: false
      - type: textInput
        name: mount_dir
        label: _("Current mount directory")
        value: "{{ _routeQueryParams.mount_dir }}"
        readonly: true
        submitValue: false
      - type: hidden
        name: snapshot_path
        value: "{{ _routeQueryParams.snapshot_path }}"
    buttons:
      - template: cancel
        execute:
          type: url
          url: "/services/btrfssnap"
      - template: submit
        text: _("Delete")
        execute:
          type: url
          url: "/services/btrfssnap"
