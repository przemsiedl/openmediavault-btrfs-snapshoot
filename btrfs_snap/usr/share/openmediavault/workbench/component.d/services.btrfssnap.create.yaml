version: "1.0"
type: component
data:
  name: omv-services-btrfssnap-create-form-page
  type: formPage
  config:
    request:
      service: BtrfsSnap
      post:
        method: createSnapshot
        progressMessage: _("Creating snapshot...")
    fields:
      - type: paragraph
        title: _("Create snapshot")
        text: _("Create a new read-only snapshot from the configured BTRFS_ROOT subvolume.")
      - type: paragraph
        title: _("Scheduled snapshots")
      - type: textInput
        name: schedule_command
        label: _("Command")
        value: "/usr/sbin/btrfssnap_snapshot"
        readonly: true
        submitValue: false
      - type: textInput
        name: schedule_example
        label: _("Cron example (daily 05:00)")
        value: "0 5 * * * /usr/sbin/btrfssnap_snapshot"
        readonly: true
        submitValue: false
      - type: textInput
        name: schedule_steps
        label: _("How to add in OMV")
        value: "System -> Scheduled Tasks -> Add -> Command, User: root, set schedule, Save"
        readonly: true
        submitValue: false
    buttons:
      - template: submit
        text: _("Create")
        execute:
          type: url
          url: "/services/btrfssnap"
      - template: cancel
        execute:
          type: url
          url: "/services/btrfssnap"
